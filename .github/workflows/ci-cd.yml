name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            alytarek78/devops-quiz-ai:latest
            alytarek78/devops-quiz-ai:${{ github.sha }}

      - name: Smoke test
        run: |
          docker build -t quiz-ai-smoke .
          docker run -d -p 5000:5000 --name quiz-ai-smoke quiz-ai-smoke
          sleep 5
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Response: $RESPONSE"
          if [[ "$RESPONSE" != "ok" ]]; then
            echo "Smoke test failed"
            docker logs quiz-ai-smoke
            docker stop quiz-ai-smoke
            exit 1
          fi
          docker stop quiz-ai-smoke

      - name: Push to Docker Hub
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            alytarek78/devops-quiz-ai:latest
            alytarek78/devops-quiz-ai:${{ github.sha }}

  deploy:
    needs: build-test-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_URL }}"
